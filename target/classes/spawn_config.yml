# ═══════════════════════════════════════════════════════════
#   Spawn — точка спавна сервера
#   Используйте & для цветовых кодов (например, &c для красного)
#   {prefix} — префикс модуля
# ═══════════════════════════════════════════════════════════

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Сообщения модуля
messages:
  no-player: "{prefix} &cТолько игроки могут использовать эту команду"
  no-permission: "{prefix} &cУ вас нет прав"
  spawn-set: "{prefix} &aТочка спавна установлена"
  spawn-not-set: "{prefix} &cСпавн не установлен"
  teleported: "{prefix} &aВы телепортированы на спавн"
  in-combat: "{prefix} &cНельзя использовать в ПВП-режиме"
