  no-permission: "&cУ вас нет прав"
  usage: "&cИспользование: /sell — открыть меню | /sell all — продать всё"
  sold: "&aПродано! Получено &e%amount%"
  nothing-to-sell: "&cНечего продавать"
  gui-sell-title: "&8Продажа — всего: &e%total%"
  confirm-lore: "&aНажмите, чтобы продать все предметы выше"
  total-lore: "&eИтого: &f%total%"
  no-auction-plugin: "&cAuctionPlugin не найден, используются цены из конфига"
