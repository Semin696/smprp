# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Название GUI
gui-title: "&8Продажа предметов"

# Процент за каждый уровень чар (3.0 = +3%)
