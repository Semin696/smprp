# ═══════════════════════════════════════════════════════════
#   Chat — форматирование чата с префиксами LuckPerms
#   Используйте & для цветовых кодов (например, &c для красного)
#
#   Локальный чат — видно в радиусе 20 блоков
#   Публичный чат — ! в начале сообщения, видно всем
#
#   Доступные плейсхолдеры:
#     {prefix}      — префикс игрока из LuckPerms
#     {suffix}      — суффикс игрока из LuckPerms
#     {team}        — название команды (если есть)
#     {voice}       — иконка голосового чата (если есть)
#     {player}      — ник игрока
#     {displayname} — отображаемое имя игрока
#     {message}     — сообщение игрока
# ═══════════════════════════════════════════════════════════

# Формат локального чата (без !)
local-format: "{team}{voice}{prefix}{player}{suffix}&7: {message}"

# Формат публичного чата (с ! в начале)
public-format: "{team}{voice}{prefix}{player}{suffix}&f: {message}"

# Использовать PlaceholderAPI для дополнительных плейсхолдеров
placeholder-api: true

# Сообщения модуля
messages:
  no-permission: "&cУ вас нет прав на эту команду"
