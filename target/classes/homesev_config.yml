# ═══════════════════════════════════════════════════════════
#   HomeSev — система домов (/sethome, /home, /delhome)
#   Используйте & для цветовых кодов (например, &c для красного)
#   {prefix} — префикс модуля
# ═══════════════════════════════════════════════════════════

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Общий лимит домов на игрока (может быть переопределён правом homesev.limit.<число>)
home-limit: 2

# Названия домов, которые считаются командными
command-home-names:
  - "командный"
  - "team"
  - "base"
  - "command"

# Сообщения модуля
messages:
  only-players: "{prefix} &cТолько игроки могут использовать эту команду"
  usage: "{prefix} &cИспользование: /{command} <название>"
  no-homes: "{prefix} &eУ вас нет сохранённых домов. Используйте /sethome <название>"
  your-homes: "{prefix} &aВаши дома: &f{homes}"
  home-not-found: "{prefix} &cДом \"{name}\" не найден"
  world-unavailable: "{prefix} &cМир этого дома больше не существует"
  teleported: "{prefix} &aТелепортирован в дом \"{name}\""
  home-set: "{prefix} &aДом \"{name}\" установлен"
  home-deleted: "{prefix} &aДом \"{name}\" удалён"
  limit-reached: "{prefix} &cВы достигли лимита &e{limit} &cдомов"
  in-combat: "{prefix} &cНельзя использовать в ПВП-режиме"
