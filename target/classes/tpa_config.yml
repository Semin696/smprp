# ═══════════════════════════════════════════════════════════
#   TPA — система телепортации (/tpa, /tpahere)
#   Используйте & для цветовых кодов (например, &c для красного)
#   {prefix} — префикс модуля
# ═══════════════════════════════════════════════════════════

# Кулдаун в секундах между использованиями /tpa и /tpahere
cooldown-seconds: 10

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Сообщения модуля (префикс добавляется автоматически)
messages:
  only-players: "&cТолько игроки могут использовать эту команду"
  usage: "&cИспользование: /{command} <игрок>"
  player-not-found: "&cИгрок не найден"
  cannot-teleport-to-self: "&cНельзя телепортироваться к самому себе"
  request-sent: "&aЗапрос отправлен &f{target}"
  prompt-tpa: "&e{player} хочет телепортироваться к вам"
  prompt-tpahere: "&e{player} просит вас телепортироваться к нему"
  button-accept: "&a[✔ Принять]"
  button-accept-hover: "&aНажмите, чтобы принять"
  button-deny: "&c[✘ Отклонить]"
  button-deny-hover: "&cНажмите, чтобы отклонить"
  no-pending-requests: "&cУ вас нет активных запросов на телепортацию"
  player-offline: "&cЭтот игрок больше не в сети"
  teleporting-to: "&aТелепортируемся к &f{player}"
  teleporting-player: "&aТелепортируем &f{player} &aк вам"
  request-denied-sender: "&f{player} &cотклонил ваш запрос на телепортацию"
  request-denied: "&cЗапрос на телепортацию отклонён"
  cooldown: "&cПодождите ещё &e%time% &cсек. перед следующим запросом"
