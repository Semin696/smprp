# ═══════════════════════════════════════════════════════════
#   AutoRestart — автоматический рестарт сервера
#   Используйте & для цветовых кодов (например, &c для красного)
#   {prefix} — префикс модуля
# ═══════════════════════════════════════════════════════════

# Включить авторестарт каждый день в 00:00 по МСК
enabled: true

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Сообщения модуля
messages:
  bossbar-planned: "{prefix} &fПлановый рестарт"
  bossbar-unscheduled: "&c&lТЕХНИЧЕСКИЙ РЕСТАРТ"
  five-minutes: "{prefix} &fРестарт сервера через &c5 минут&f!"
  less-five-minutes: "{prefix} &fРестарт сервера через &cменее 5 минут&f!"
  ten-seconds: "&8[&a&lmcru&8] &cРестарт через 10 секунд!"
  title: "&c&lРЕСТАРТ ЧЕРЕЗ {seconds} СЕКУНД"
  restarting: "&c&l[AutoRestart] &fПерезапуск сервера..."
  no-permission: "{prefix} &cУ вас нет прав на выполнение этой команды."
  already-scheduled: "{prefix} &cПерезапуск уже запланирован."
  command-1: "{prefix} &c&lТехнический рестарт сервера!"
  command-2: "{prefix} &fНезапланированный перезапуск через 1 минуту."
