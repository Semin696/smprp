# ═══════════════════════════════════════════════════════════
#   SDS Oraxen Module Configuration
#   Отдельный конфиг для настройки Oraxen-модуля
#   Базовая папка с конфигами: Oraxen/
# ═══════════════════════════════════════════════════════════

Oraxen:
  # Путь к папке с конфигами Oraxen
  # Можно указать:
  #   "omp"                             — папка внутри plugins/
  #   "Oraxen"                          — папка в корне сервера
  #   абсолютный путь
  folder: "omp"

  # Генерация моделей предметов из items/*.yml
  generate-models: true

  # Генерация шрифтов из glyphs/*.yml и font.yml
  generate-fonts: true

  # Генерация sounds.json из sounds.yml
  generate-sounds: true

  # Исключаемые файлы/папки при копировании из pack/
  exclude:
    - "pack.zip"
    - "uploads"
    - "__MACOSX"
