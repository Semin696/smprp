# ═══════════════════════════════════════════════════════════
#   Season — управление сезонами (/startsezon)
#   Во время сезона вайтлист выключен, после — включается
#   Игроки на сервере автоматически добавляются в вайтлист
# ═══════════════════════════════════════════════════════════

# Размер мира после начала сезона (в блоках от центра). 20000 = 20к
border-size: 20000

# Время расширения границы (в секундах)
border-time: 10000

# Длительность защиты после начала сезона (в секундах). 3600 = 1 час
protection-duration: 3600

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

messages:
  protection-activated: "{prefix} &aВы получили защиту на &e%time%"
  protection-expired: "{prefix} &cЗащита закончилась! Теперь вы уязвимы."
  protection-remaining: "{prefix} &eЗащита: &c%time%"
