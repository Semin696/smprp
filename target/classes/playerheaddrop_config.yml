# ═══════════════════════════════════════════════════════════
#   PlayerHeadDrop — выпадение голов игроков при смерти
# ═══════════════════════════════════════════════════════════

# Шанс выпадения головы (0.0 — никогда, 1.0 — всегда)
drop-chance: 1.0

# Выпадение головы при смерти от другого игрока (PvP)
pvp: true

# Выпадение головы при смерти от моба (PvE)
pve: false

# Выпадение головы при смерти от других причин (падение, огонь и т.д.)
other: false
