# ═══════════════════════════════════════════════════════════
#   Order — система ордеров (заказов/продажи)
#   Используйте & для цветовых кодов (например, &c для красного)
#   {prefix} — префикс модуля
# ═══════════════════════════════════════════════════════════

# Префикс для сообщений
prefix: "&#65FFAE&lm&#57F574&lc&#48EA3A&lr&#3AE000&lu"

# Сообщения модуля
messages:
  broadcast: "&e%player% &fхочет купить &a%item%%amount%&f!"
  offer-sent-buyer: "&e%seller% &fхочет продать вам &a%item%%amount%&f!"
  offer-sent-seller: "{prefix} &aВы предложили &e%buyer% &aпродажу &a%item%%amount%"
  offer-accepted: "{prefix} &fНачат приватный чат с &e%player%&f. Напишите &c/order stop &fдля выхода."
  offer-declined: "{prefix} &c%player% отклонил ваше предложение."
  chat-ended: "{prefix} &cПриватный чат с &e%player% &cзавершён."
  no-chat: "{prefix} &cУ вас нет активного приватного чата."
  usage: "{prefix} &cИспользование: /order <предмет> [количество]"
  in-chat-order: "{prefix} &cВы не можете создать ордер, находясь в приватном чате."
  in-chat-offer: "{prefix} &cВы не можете сделать предложение, находясь в приватном чате."
  not-found: "{prefix} &cИгрок не найден."
