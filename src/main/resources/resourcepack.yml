# ═══════════════════════════════════════════════════════════
#   SDS ResourcePack
#   Конфиг совместим с папкой Oraxen
#   Загрузка на GitHub вместо polymath/oraxen.com
# ═══════════════════════════════════════════════════════════

Pack:
  # URL ресурспака (заполняется автоматически после сборки)
  pack-url: ""

  # SHA-1 хеш ресурспака (заполняется автоматически)
  pack-hash: ""

  # Авто-сборка при запуске сервера
  auto-build: true

  upload:
    enabled: true
    type: github # lobfile, polymath, self-host, external, github
    github:
      repo: "Semin696/smprp"
      token: "YOUR_GITHUB_TOKEN"
      branch: "main"
      path: "resourcepack.zip"
    polymath:
      server: atlas.oraxen.com
      secret: ""
    lobfile:
      api-key: ""
      pack-name: SDS
    self-host:
      host: 0.0.0.0
      port: 8080
      domain: localhost:8080

  dispatch:
    send_on_join: true
    send_on_reload: true
    delay: 40
    mandatory: true
    prompt: "§6Нажмите Да, чтобы увидеть все предметы"
    layer: ""

  receive:
    enabled: true
    loaded:
      actions:
        delay: 5
        message:
          enabled: false
          type: ACTION_BAR
          content: "<green>ResourcePack loaded"
        commands:
          console: []
          player: []
    accepted:
      actions:
        message:
          enabled: false
          type: ACTION_BAR
          content: "<green>ResourcePack accepted"
    denied:
      actions:
        message:
          enabled: true
          type: CHAT
          content: "<red>Вы отказались от ресурспака"
        commands:
          console: []
          player: []
    failed_download:
      actions:
        message:
          enabled: true
          type: CHAT
          content: "<red>Не удалось загрузить ресурспак"
