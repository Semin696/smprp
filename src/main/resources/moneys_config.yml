  # Боссы — самые редкие и опасные
  bosses:
    min: 20.0
    max: 100.0
    mobs:
      - WARDEN
      - WITHER
      - ENDER_DRAGON
      - ELDER_GUARDIAN
  # Враждебные мобы
  hostile:
