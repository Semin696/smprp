name: Create Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.217.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: chmod +x gradlew
      - name: Update version
        run: echo "pluginVersion=${{ github.event.inputs.version }}" > gradle.properties
      - name: Build
        run: ./gradlew shadowJar --no-daemon
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            Oraxen v${{ github.event.inputs.version }}
            
            Download the JAR from the artifacts below.
          files: build/libs/oraxen-*.jar
          draft: true
